# Example:
#   helm template agent-platform ./uniDeploy -f uniDeploy/values.agent-platform.example.yaml

appName: agent

imagePullSecrets:
  - name: container-registry-imagepullsecret

containers:
  - name: agent
    image:
      repository: ghcr.io/perfect-art-doo/kcp-mcp-agent-template
      tag: latest
      pullPolicy: Always
    env:
      - PORT: "8000"
      - A2A__HOST: "agent-platform.dev.kcp.perfectartco.com"
      - A2A__PORT: "443"
      - A2A__PROTOCOL: "https"
    ports:
      - name: http
        containerPort: 8000

service:
  - fullName: agent-platform-agent
    ports:
      - name: http
        port: 8000
        containerPort: 8000

oauth2Proxy:
  enabled: true
  fullnameOverride: agent-platform-oauth2-proxy
  imagePullSecrets:
    - name: container-registry-imagepullsecret
  checkConnectionBeforeStart:
    - host: keycloak
      port: 8080
  containers:
    - name: oauth2-proxy
      image:
        repository: quay.io/oauth2-proxy/oauth2-proxy
        tag: v7.14.3
        pullPolicy: IfNotPresent
      envFromSecrets:
        - fullSecretName: agent-platform-oauth2-proxy-secret
          variable: OAUTH2_PROXY_CLIENT_SECRET
        - fullSecretName: agent-platform-oauth2-proxy-secret
          variable: OAUTH2_PROXY_COOKIE_SECRET
      args:
        - --provider=keycloak-oidc
        - --client-id=agent-platform
        - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
        - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
        - --redirect-url=https://agent-platform.dev.kcp.perfectartco.com/oauth2/callback
        - --oidc-issuer-url=https://keycloak.dev.kcp.perfectartco.com/realms/dev
        - --http-address=0.0.0.0:4180
        - --upstream=http://agent-platform-ui
        - --reverse-proxy=true
        - --pass-access-token=true
        - --pass-user-headers=true
        - --set-xauthrequest=true
        - --cookie-secure=true
        - --skip-provider-button=true
      ports:
        - name: http
          containerPort: 4180
      readinessProbe:
        tcpSocket:
          port: 4180
      livenessProbe:
        tcpSocket:
          port: 4180
  service:
    - fullName: agent-platform-oauth2-proxy
      ports:
        - name: http
          port: 4180
          containerPort: 4180

ui:
  enabled: true
  fullnameOverride: agent-platform-ui
  imagePullSecrets:
    - name: container-registry-imagepullsecret
  containers:
    - name: ui
      image:
        repository: ghcr.io/perfect-art-doo/kcp-ai-chat-ui
        tag: latest
        pullPolicy: Always
      env:
        - UI_PROXY_TARGET: "http://agent-platform-bff:8080"
      ports:
        - name: http
          containerPort: 80
  service:
    - fullName: agent-platform-ui
      ports:
        - name: http
          port: 80
          containerPort: 80

bff:
  enabled: true
  fullnameOverride: agent-platform-bff
  imagePullSecrets:
    - name: container-registry-imagepullsecret
  containers:
    - name: bff
      image:
        repository: ghcr.io/perfect-art-doo/kcp-chat-backend
        tag: latest
        pullPolicy: Always
      env:
        - AGENTGATEWAY_URL: "http://agentgateway-internal.agentgateway-system.svc.cluster.local"
        - TARGET_AGENT_SERVICE: "agent-platform-agent"
      ports:
        - name: http
          containerPort: 8080
  service:
    - fullName: agent-platform-bff
      ports:
        - name: http
          port: 8080
          containerPort: 8080

httpRoutes:
  - name: agent-platform
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: gateway
        namespace: istio-system
    hostnames:
      - agent-platform.dev.kcp.perfectartco.com
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - group: ""
            kind: Service
            name: agent-platform-oauth2-proxy
            port: 4180
