{{- range .Values.httpRoutes }}
---
apiVersion: {{ default "gateway.networking.k8s.io/v1" .apiVersion }}
kind: HTTPRoute
metadata:
  name: {{ .name | quote }}
  namespace: {{ default $.Release.Namespace .namespace | quote }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    {{- with .labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  {{- with .hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- toYaml .rules | nindent 4 }}
{{- end }}
