{{ include "app.renderImagePullSecret" (dict "root" . "values" .Values) }}
{{- if .Values.oauth2Proxy.enabled }}
{{ include "app.renderImagePullSecret" (dict "root" . "values" .Values.oauth2Proxy "component" "oauth2-proxy" "defaultName" "oauth2-proxy") }}
{{- end }}
{{- if .Values.ui.enabled }}
{{ include "app.renderImagePullSecret" (dict "root" . "values" .Values.ui "component" "ui" "defaultName" "ui") }}
{{- end }}
{{- if .Values.bff.enabled }}
{{ include "app.renderImagePullSecret" (dict "root" . "values" .Values.bff "component" "bff" "defaultName" "bff") }}
{{- end }}
