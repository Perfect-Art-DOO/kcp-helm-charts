kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector: 
          matchLabels:
            app: {{ .Release.Name }}

      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range $i, $v := .Values.image.pullSecrets }}
        - name: {{ $v }}
        {{- end }}
      {{- end }}

      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
      - name: oauth-proxy
        ports:
        - containerPort: 4180
        env:
          - name: OAUTH2_PROXY_PROVIDER
            value: oidc

          - name: OAUTH2_PROXY_PROVIDER_DISPLAY_NAME
            value: Perfectart

          - name: OAUTH2_PROXY_SESSION_COOKIE_MINIMAL
            value: "true"

          - name: OAUTH2_PROXY_EMAIL_DOMAINS
            value: "*"

          - name: OAUTH2_PROXY_EMAIL_DOMAIN
            value: "*"

          - name: OAUTH2_PROXY_COOKIE_EXPIRE
            value: "1h0m0s"

          - name: OAUTH2_PROXY_CLIENT_ID
            value: "{{ .Values.clientID }}"

          - name: OAUTH2_PROXY_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secretName }}
                key: clientSecret

          - name: OAUTH2_PROXY_COOKIE_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secretName }}
                key: secretKey

          - name: OAUTH2_PROXY_REDIRECT_URL
            value: "https://{{ .Values.ingressHost }}/oauth2/callback"

          - name: OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY 
            value: "true"
        
        args:
          - "--upstream={{ .Values.upstream }}"
          - "--http-address=0.0.0.0:4180"
          - "--oidc-issuer-url={{ .Values.keycloak_url }}"
          - "--allowed-group={{ .Values.keycloak_group }}"
          - "--skip-provider-button=true"
          - "--ssl-upstream-insecure-skip-verify=true"
          - "--prefer-email-to-user={{ .Values.email_as_username }}"
          - "--pass-basic-auth=true"
          - "--pass-user-headers=true"
          - "--scope={{ .Values.scope }}"
          # dev test only
          # - "--redirect-url=http://localhost:8080/oauth2/callback"
          # - "--cookie-secure=false"

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        image: "{{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
      dnsPolicy: ClusterFirst
